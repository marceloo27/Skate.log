<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKATE.LOG | Login</title>


    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/auth.css">
   
    
     <link rel="shortcut icon" href="./img/logo.png" type="image/x-icon">


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" 
    />
</head>
<body>

    
    <a class="btn_home" href="./index.html">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="wrapper wrapper_login">

        
        <div class="img_box">
            <img src="./img/img_cadastrologin.jpg">
        </div>

    
        <div class="container_autenticar">

            <img class="logo_autenticar logo_autenticar_login" src="./img/logo.png">

            <h3>ENTRAR NO SKATE.LOG</h3>

            
            <div class="input_section">
                 <i class="fa-solid fa-envelope"></i>
                <input type="email" id="ipt_email" class="input_autenticar" placeholder="Email">
            </div>

            <div class="input_section">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="ipt_senha" class="input_autenticar" placeholder="Senha">  
            </div>


            <p id="mensagem_autenticar" class="mensagem_autenticar"></p>

            <button class="btn_autenticar" onclick="entrar()">
                Entrar
               
            </button>

            <a class="link_autenticar" href="./cadastro.html">Não tem conta? inscreva-se</a>
        </div>
    </div>

<script src="./scripts/utils/sessao.js"></script>

<script>


    function entrar() {
        // aguardar();

        var emailVar = ipt_email.value;
        var senhaVar = ipt_senha.value;

        let emailRegex = /[^@ \t\r\n]+@[^@ \t\r\n]+\.[^@ \t\r\n]+/;

        let senhaRegex = /^(?=.*?[A-Z])(?=.*?[a-z])(?=.*?[^\w\s]).{6,}$/;
         if (emailVar == "" || senhaVar == "") {
            mensagem_autenticar.style.display = "block";
            mensagem_autenticar.classList.add("error");
            mensagem_autenticar.innerHTML = "Preencha todos os campos antes de seguir em frente!";
            
            return false;
        }
        if(!emailRegex.test(emailVar)) {
            mensagem_autenticar.style.display = "block";
            mensagem_autenticar.classList.add("error");
            mensagem_autenticar.innerHTML = "Formato de e-mail inválido.";
            return false;
        }

        if(!senhaRegex.test(senhaVar)) {
            mensagem_autenticar.style.display = "block";
            mensagem_autenticar.classList.add("error");
            mensagem_autenticar.innerHTML = "Senha deve obedecer ao formato: mínimo 6 caracteres | 1 maiúscula | 1 minúscula | 1 caractere especial.";
            return false;
        }

       
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);



        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then((resposta) => {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.table(json);
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.idUsuario;
                    sessionStorage.ESTILO_USUARIO = json.estilo;
                    

                    setTimeout(() => {
                        window.location = "./dashboard.html";
                    }, 1000); 

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);

                    mensagem_autenticar.style.display = "block";
                    mensagem_autenticar.classList.add("error");
                    mensagem_autenticar.innerHTML = texto; 
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        mensagem_autenticar.style.display = "none"
    }

</script>
</body>
</html>
