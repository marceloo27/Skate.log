<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKATE.LOG / QUIZ</title>

    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/quiz.css">
    
    <link rel="shortcut icon" href="./img/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="dashboard_container">
        
        <div class="sidebar">
            <div class="header">
                <img src="./img/logo.png" class="logo">
                <h1>SKATE.LOG - <br>QUIZ</h1>
            </div>

            <nav class="navlist">
                <div class="nav-section">
                    <h4>Menu</h4>
                    <a href="dashboard.html" class="navitem">
                        <i class="fa-solid fa-house"></i>
                        <span>Início</span>
                    </a>
                    <a href="sessoes.html" class="navitem">
                        <i class="fa-solid fa-arrow-up-from-bracket"></i>
                        <span>Cadastrar sessão</span>
                    </a>
                    <a href="quiz.html" class="navitem active">
                        <i class="fa-solid fa-pen-to-square"></i>
                        <span>Quiz</span>
                    </a>
                </div>
            </nav>

            <div class="footer">
                <div class="logged-account">
                    <i class="fa-solid fa-circle-user pfp" style="font-size: 48px; color: white;"></i>
                    <div>
                        <p id="account-username"></p>
                        <span id="account-style"></span>
                    </div>
                </div>
                <button id="logout-btn" onclick="limparSessao()">
                    <span>Sair</span>
                </button>
            </div>
        </div>

        <main class="main-content-quiz">
            <div class="quiz-container">
                
                <button id="btn_proxima" onclick="proximaPergunta()">
                    <i class="fa-solid fa-arrow-right"></i>
                </button>

                <div class="quiz-text-box">
                    <div id="quiz_caixa">
                        <h2 id="pergunta"></h2>
                        <div class="section-opcoes" id="div_opcoes">
                            </div>
                    </div>

                    <div id="div_resultado">
                        
                        <p id="nota"></p>
                 
                    </div>
                </div>
                
            </div>
        </main>
    </div>
    

    <script src="./scripts/utils/sessao.js"></script>
    <script>
   

    let dados = [
    {
        pergunta: "Qual o nome da prancha?",
        opcoes: ["shape", "deck", "tábua", "madeira"],
        correta: 0
    },
    {
        pergunta: "Quem é a 'Fadinha' do skate?",
        opcoes: ["letícia", "rayssa leal", "pâmela", "Nathalia"],
        correta: 1
    },
    {
        pergunta: "Qual a manobra mais básica?",
        opcoes: ["Kickflip", "Heelflip", "hardflip", "Ollie"],
        correta: 3
    },
    {
        pergunta: "Quantas rodas tem um skate tradicional?",
        opcoes: ["2", "4", "8", "1"],
        correta: 1
    },
    {
        pergunta: "Onde nasceu o skate?",
        opcoes: ["são paulo", "califórnia", "paris", "oregon"],
        correta: 1
    },
    {
        pergunta: "O que prende as rodas em um skate?",
        opcoes: ["truck", "rolamento", "lixa", "parafuso"],
        correta: 0
    },
    {
        pergunta: "O que dá aderência ao skate?",
        opcoes: ["cera", "lixa", "verniz", "vela"],
        correta: 1
    },
    {
        pergunta: "Como é chamado o skate longo?",
        opcoes: ["streetskate", "cruiser", "fingerboard", "longboard"],
        correta: 3
    },
    {
        pergunta: "Qual a manobra que desliza no ferro?",
        opcoes: ["manual", "grind", "flip", "heelflip"],
        correta: 1
    },
    {
        pergunta: "Nos ultimos tempos ele virou um esporte?",
        opcoes: ["proibido", "olímpico", "de Inverno", "aquático"],
        correta: 1
    }
];

    let indice = 0;
    let pontos = 0;
    let respondido = false; 

    function carregarPergunta() {
        respondido = false; 
        
        pergunta.innerHTML = `${indice + 1} . - ${dados[indice].pergunta}`
        div_opcoes.innerHTML = "";

       
            for(let i = 0; i < dados[indice].opcoes.length; i++){
            div_opcoes.innerHTML += `
                <button onclick="verificar(${i})" class="opt-btn">
                    ${dados[indice].opcoes[i]}
                </button>`;
        }
        
      
    }

    function verificar(escolha) {
    
        if (respondido == true) {
            return; 
        }

        respondido = true; 

        
        if(escolha == dados[indice].correta){
            pontos++;
        }
        
      

        
    }

    function proximaPergunta() {
        indice++;
      
            if(indice < dados.length){
            carregarPergunta();
        } else {
            nota.innerHTML = ""
            nota.innerHTML = `<h2 style="color: #FFD700;">Fim do role!</h2> <br>`
            nota.innerHTML += `acertou: ${pontos} / 10 <br> <button onclick="reiniciarQuiz()" class="opt-btn" style="text-align: center; margin-top: 20px;"> Tentar Novamente </button>`
            pergunta.innerHTML = ""
            div_opcoes.innerHTML = ""
            btn_proxima.style.display = "none";
            if(pontos > 8){
                div_resultado.innerHTML += `<img style="width: 100px;" src="https://cdn-icons-png.flaticon.com/512/5057/5057900.png" alt="">`
            }
        }
    }

    function reiniciarQuiz() {
        indice = 0;
        pontos = 0;
        respondido = false;

        div_resultado.innerHTML = '<p id="nota"></p>';
        btn_proxima.style.display = "block";
        carregarPergunta();
    }


    validarSessao();
    carregarPergunta();
</script>
</body>
</html>
