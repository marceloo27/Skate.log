<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKATE.LOG / QUIZ</title>

    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/quiz.css">
    
    <link rel="shortcut icon" href="./img/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <body>
    <div class="dashboard_container">
        
        <div class="sidebar">
            <div class="header">
                <img src="./img/logo.png" class="logo">
                <h1>SKATE.LOG - <br>QUIZ</h1>
            </div>

            <nav class="navlist">
                <div class="nav-section">
                    <h4>Menu</h4>
                    <a href="dashboard.html" class="navitem">
                        <i class="fa-solid fa-house"></i>
                        <span>Início</span>
                    </a>
                    <a href="sessoes.html" class="navitem">
                        <i class="fa-solid fa-arrow-up-from-bracket"></i>
                        <span>Cadastrar sessão</span>
                    </a>
                    <a href="quiz.html" class="navitem active">
                        <i class="fa-solid fa-pen-to-square"></i>
                        <span>Quiz</span>
                    </a>
                </div>
            </nav>

            <div class="footer">
                <div class="logged-account">
                    <i class="fa-solid fa-circle-user pfp" style="font-size: 48px; color: white;"></i>
                    <div>
                        <p id="account-username"></p>
                        <span id="account-style"></span>
                    </div>
                </div>
                <button id="logout-btn" onclick="limparSessao()">
                    <span>Sair</span>
                </button>
            </div>
        </div>

        <main class="main-content-quiz">
            <div class="quiz-container">
                
                <button id="btn_proxima" onclick="proximaPergunta()">
                    <i class="fa-solid fa-arrow-right"></i>
                </button>

                <div class="quiz-text-box">
                    <div id="quiz_caixa">
                        <h2 id="pergunta"></h2>
                        <div class="section-opcoes" id="div_opcoes">
                            </div>
                    </div>

                    <div id="div_resultado" style="display: none;">
                        <h2 style="color: #FFD700;">Fim do role!</h2>
                        <p id="nota"></p>
                 
                    </div>
                </div>
                
            </div>
        </main>
    </div>
    

    <script src="./scripts/utils/sessao.js"></script>
    <script>
    let perguntas = [
        "Qual o nome da prancha?", 
        "Quem é a 'Fadinha' do skate?", 
        "Qual a manobra mais básica?",
        "Quantas rodas tem um skate tradicional?",
        "Onde nasceu o skate?",
        "O que prende as rodas em um skate?",
        "O que dá aderência ao skate?",
        "Como é chamado o skate longo?",
        "Qual a manobra que desliza no ferro?",
        "Nos ultimos tempos ele virou um esporte?"
    ];

    let opcoes = [
        ["shape", "deck", "tábua", "madeira"], 
        ["letícia", "rayssa leal", "pâmela", "Nathalia"], 
        ["Kickflip", "Heelflip", "hardflip", "Ollie"],
        ["2", "4", "8", "1"],
        ["são paulo", "califórnia" , "paris", "oregon"],
        ["truck", "rolamento", "lixa", "parafuso"],
        ["cera", "lixa", "verniz", "vela"],
        ["streetskate", "cruiser", "fingerboard", "longboard"],
        ["manual", "grind", "flip", "heelflip"],
        ["proibido", "olímpico", "de Inverno", "aquático"]
    ];

    let corretas = [0, 1, 3, 1, 1, 0, 1, 3, 1, 1];

    let indice = 0;
    let pontos = 0;
    let respondido = false; 

    function carregarPergunta() {
        respondido = false; 
        
        pergunta.innerHTML = `${indice + 1} . - ${perguntas[indice]}`
        div_opcoes.innerHTML = "";

        let lista_opcoes = opcoes[indice];

        for (let i = 0; i < lista_opcoes.length; i++) {
            div_opcoes.innerHTML += `
                <button onclick="verificar(${i})" class="opt-btn">
                    ${lista_opcoes[i]}
                </button>`;
        }
        
        btn_proxima.style.display = "none";
    }

    function verificar(escolha) {
    
        if (respondido == true) {
            return; 
        }

        respondido = true; 

        if (escolha == corretas[indice]) {
            pontos++;
        }
        
        btn_proxima.style.display = "block";

        
    }

    function proximaPergunta() {
        indice++;
        if (indice < perguntas.length) {
            carregarPergunta();
        } else {
            quiz_caixa.style.display = "none";
            btn_proxima.style.display = "none";
            div_resultado.style.display = "block";
            nota.innerHTML = "acertou: " + pontos + "/ 10";
            if(pontos > 8){
                div_resultado.innerHTML += `<img style="width: 100px;" src="https://cdn-icons-png.flaticon.com/512/5057/5057900.png" alt="">`
            }
        }
    }


    validarSessao();
    carregarPergunta();
</script>
</html>
