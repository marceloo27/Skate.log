<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKATE.LOG | Cadastro</title>

    
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/auth.css">
   
     <link rel="shortcut icon" href="./img/logo.png" type="image/x-icon">

  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body> 

    
    <a class="btn_home" href="./login.html" title="Voltar a tela de login">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="wrapper wrapper_cadastro"> 

        
        <div class="img_box">
            <img src="./img/img_cadastrologin.jpg">
        </div>

      
        <div class="container_autenticar">

            <img class="logo_autenticar logo_autenticar_cadastro" src="./img/logo.png">

            <h3>CADASTRE-SE NO SKATE.LOG</h3>

          
            
            <div class="input_section">
              <i class="fa-solid fa-user"></i>
                <input type="text" id="ipt_usuario" class="input_autenticar" placeholder="Nome">
            </div>

          
            <div class="input_section">
                 <i class="fa-solid fa-envelope"></i>
                <input type="email" id="ipt_email" class="input_autenticar" placeholder="Email">
            </div>

            <div class="input_section">
                <i class="fa-solid fa-skating"></i>
                  <select id="sel_estilo" class="input_autenticar">
                    <option>Qual seu estilo principal?</option>
                    <option value="Street">Street</option>
                    <option value="Transition">Transition (Rampa)</option>
                    <option value="Freestyle">Freestyle</option>
                  </select>
    </div>

            
            <div class="input_section">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="ipt_senha" class="input_autenticar" placeholder="Senha"> 
            </div>

            <div class="input_section">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="ipt_confirmar" class="input_autenticar" placeholder="Confirmar senha">   
            </div>

           
            <p id="mensagem_autenticar" class="mensagem_autenticar"></p>

            <button class="btn_autenticar" onclick="cadastrar()">
                Cadastrar
              
            </button>

            <a class="link_autenticar logo_autenticar_cadastro" href="login.html">Já tem uma conta? Entrar</a>

        </div>
    </div>
    

<script src="./scripts/utils/sessao.js"></script>
<script>


  function resetarMensagem() {
    mensagem_autenticar.style.display = "none";
    mensagem_autenticar.classList.remove("error", "success");
    mensagem_autenticar.innerHTML = "";
}

  function cadastrar() {
    

    resetarMensagem();

   
    var nomeVar = ipt_usuario.value;
    var emailVar = ipt_email.value;
    var senhaVar = ipt_senha.value;
    var confirmacaoSenhaVar = ipt_confirmar.value;
    var estiloVar = sel_estilo.value;

      let emailRegex = /[^@ \t\r\n]+@[^@ \t\r\n]+\.[^@ \t\r\n]+/;
      let senhaRegex = /^(?=.*?[A-Z])(?=.*?[a-z])(?=.*?[^\w\s]).{8,}$/;

    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == "" ||
      estiloVar == ""
    ) {
      mensagem_autenticar.style.display = "block";
      mensagem_autenticar.classList.add("error");
      mensagem_autenticar.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

    //   finalizarAguardar();
      return false;
    }
      if(!emailRegex.test(emailVar)) {
        mensagem_autenticar.style.display = "block";
        mensagem_autenticar.classList.add("error");
        mensagem_autenticar.innerHTML = "Formato de e-mail inválido.";
        return false;
      }

      if(!senhaRegex.test(senhaVar) || !senhaRegex.test(confirmacaoSenhaVar)) {
        mensagem_autenticar.style.display = "block";
        mensagem_autenticar.classList.add("error");
        mensagem_autenticar.innerHTML = "Senha deve obedecer ao formato: mínimo 8 caracteres | 1 maiúscula | 1 minúscula | 1 caractere especial.";
        return false;
      }

      if(senhaVar !== confirmacaoSenhaVar) {
        mensagem_autenticar.style.display = "block";
        mensagem_autenticar.classList.add("error");
        mensagem_autenticar.innerHTML = "Senhas não coincidem!";
        return false;
      }

      if(nomeVar.length < 3) {
        mensagem_autenticar.style.display = "block";
        mensagem_autenticar.classList.add("error");
        mensagem_autenticar.innerHTML = "Nome de usuário deve possuir mais do que 3 caracteres.";
        return false;
      }

  else {
      setInterval(sumirMensagem, 5000);
    }

    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
       
        
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        estiloServer: estiloVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          mensagem_autenticar.style.display = "block";
          mensagem_autenticar.classList.add("success");
          mensagem_autenticar.innerHTML =
            "Cadastro realizado, indo para tela de login";

          setTimeout(() => {
            window.location = "login.html";
          }, 2000);

          limparFormulario();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });

    return false;
  }


  function sumirMensagem() {
    mensagem_autenticar.style.display = "none";
  }
</script>
</body>
</html>
