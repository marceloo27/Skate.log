window.onload = exibirGraficosDinamicos();

function exibirGraficosDinamicos() {
    obterDadosTreino(idUsuario);
    obterDadosManobras(idUsuario);
}

// barras
function obterDadosTreino(idUsuario) {
   
    fetch(`/aquarios/buscar/${idUsuario}`, { cache: 'no-store' }).then((response) => {
        if (response.ok) {
            response.json().then((resposta) => {
                console.log(`Dados Treino: ${JSON.stringify(resposta)}`);
                plotarGraficoBarras(resposta);
                atualizarKPIs(resposta); 
            });
        } else {
            console.error('Erro ao buscar dados de treino');
        }
    });
}

function plotarGraficoBarras(resposta) {
    let labels = [];
    let dadosTempo = [];

   let limite = 7; 
    
   
    if (resposta.length < limite) {
        limite = resposta.length;
    }

   
    for (let i = 0; i < limite; i++) {
        let registro = resposta[i];
        
        
        labels.unshift(`${registro.diaSemana} (${registro.dtSessao})`);
        dadosTempo.unshift(registro.tempoMinutos);
    }

    let ctx = document.getElementById('chartBarras');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Minutos de treino',
                data: dadosTempo,
                backgroundColor: '#FFD700',
                borderRadius: 10
            }]
        },
        options:
         {
            maintainAspectRatio: false,
            scales: { 
                y: {  grid: { color: '#333' } },
                x: { ticks: { color: '#fff' } }
            },
            plugins: { legend: { labels: { color: '#fff' } } }
        }
    });
}

// pizza
function obterDadosManobras(idUsuario) {

    fetch(`/empresas/manobras/${idUsuario}`, { cache: 'no-store' }).then((response) => {
        if (response.ok) {
            response.json().then( (resposta) => {
                plotarGraficoPizza(resposta);
            });
        } else {
            console.error('Erro ao buscar dados de manobras');
        }
    });
}

function plotarGraficoPizza(resposta) {
    let labels = [];
    let quantidades = [];

    resposta.forEach((dado) => {
        labels.push(dado.nomeManobra);
        quantidades.push(dado.qtd);
    });

    let ctx = document.getElementById('chartPizza');
    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                label: "Qtd",
                data: quantidades,
                backgroundColor: ['#FFD700', '#FFFFFF', '#808080', '#505050', '#202020', '#A0A0A0'],
                borderWidth: 0
            }]
        },
        options: {
            maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } }
        }
    });
}

function atualizarKPIs(dados) {
   
    let listaSessoes = dados;
    
    let totalMinutos = 0;

    for (let i = 0; i < listaSessoes.length; i++) { 
        // percorre os selects e soma o tempo minutos    
        totalMinutos += Number(listaSessoes[i].tempoMinutos);  
    document.getElementById("kpi_total_horas").innerHTML = totalMinutos + " min";
    document.getElementById("kpi_sessoes").innerHTML = listaSessoes.length;    
    document.getElementById("kpi_msessao").innerHTML = `${(totalMinutos / listaSessoes.length).toFixed(1)} min`;
}
}
