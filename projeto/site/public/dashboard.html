<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKATE.LOG / AREA DO CLIENTE</title>


    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/dashboard.css">
    <link rel="shortcut icon" href="./img/logo.png" type="image/x-icon">


    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body onload="validarSessao()">
    <div class="dashboard_container">
        
        <div class="sidebar">
            <div class="header">
                <img src="./img/logo.png" class="logo">
                <h1>SKATE.LOG - PÁGINA DO CLIENTE</h1>
            </div>

            <nav class="navlist">
                <div class="nav-section">
                    <h4>Menu</h4>
                    <a href="#" class="navitem active">
                        <i class="fa-solid fa-house"></i>
                        <span>Início</span>
                    </a>
                    <a href="sessoes.html" class="navitem">
                        <i class="fa-solid fa-arrow-up-from-bracket"></i>
                        <span>Cadastrar sessão</span>
                    </a>
                    <a href="quiz.html" class="navitem">
                        <i class="fa-solid fa-pen-to-square"></i>
                        <span>Quiz</span>
                    </a>
                </div>
            </nav>

            <div class="footer">
                <div class="logged-account">
                    <i class="fa-solid fa-circle-user pfp" style="font-size: 48px; display: flex; justify-content: center; align-items: center; color: white;"></i>
                    <div>
                        <p id="account-username"></p>
                        <!-- <span id="account-email"></span> -->
                        <span id="account-style"></span>
                    </div>
                </div>
                <button id="logout-btn" onclick="limparSessao()">
                    <span>Sair</span>
                </button>
            </div>
        </div>

        <main class="main-content">
            
            <div class="kpi-container">
                <div class="kpi-card">
                    <h4>Total tempo (minutos)</h4>
                    <p id="kpi_total_horas">0h</p>
                </div>
                <div class="kpi-card">
                    <h4>Total sessões feitas</h4>
                    <p id="kpi_sessoes">0</p>
                </div>
                <div class="kpi-card">
                    <h4>Média tempo por sessão</h4>
                    <p id="kpi_msessao">---</p>
                </div>
            </div>

            <div class="charts-container">
                <div class="chart-box" style="flex: 2;">
                    <h3>Tempo de treino por dia (ultima semana)</h3>
                    <div style="height: 300px;">
                        <canvas id="chartBarras"></canvas>
                    </div>
                </div>
                <div class="chart-box" style="flex: 1;">
                    <h3>Distribuição de manobras favoritas</h3>
                    <div style="height: 300px;">
                        <canvas id="chartPizza"></canvas>
                    </div>
                </div>
            </div>

        </main>
    </div>




        <script src="./scripts/utils/sessao.js"></script>
        <script src="./scripts/dashboard-charts.js"></script>
</body>

</html>
<script>
    
 


var idUsuario = sessionStorage.ID_USUARIO;
document.getElementById("account-username").innerHTML = sessionStorage.NOME_USUARIO;
document.getElementById("account-style").innerHTML = sessionStorage.ESTILO_USUARIO;



window.onload = exibirGraficosDinamicos();

function exibirGraficosDinamicos() {
    obterDadosTreino(idUsuario);
    obterDadosManobras(idUsuario);
}

// barras
function obterDadosTreino(idUsuario) {
   
    fetch(`/aquarios/buscar/${idUsuario}`, { cache: 'no-store' }).then((response) => {
        if (response.ok) {
            response.json().then((resposta) => {
                console.log(`Dados Treino: ${JSON.stringify(resposta)}`);
                plotarGraficoBarras(resposta);
                atualizarKPIs(resposta); 
            });
        } else {
            console.error('Erro ao buscar dados de treino');
        }
    });
}

function plotarGraficoBarras(resposta) {
    let labels = [];
    let dadosTempo = [];

   let limite = 7; 
    
   
    if (resposta.length < limite) {
        limite = resposta.length;
    }

   
    for (let i = 0; i < limite; i++) {
        let registro = resposta[i];
        
        
        labels.unshift(`${registro.diaSemana} (${registro.dtSessao})`);
        dadosTempo.unshift(registro.tempoMinutos);
    }

    let ctx = document.getElementById('chartBarras');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Minutos de treino',
                data: dadosTempo,
                backgroundColor: '#FFD700',
                borderRadius: 10
            }]
        },
        options:
         {
            maintainAspectRatio: false,
            scales: { 
                x: { ticks: { color: '#fff' } }
            },
            plugins: { legend: { labels: { color: '#fff' } } }
        }
    });
}

// pizza
function obterDadosManobras(idUsuario) {

    fetch(`/empresas/manobras/${idUsuario}`, { cache: 'no-store' }).then((response) => {
        if (response.ok) {
            response.json().then( (resposta) => {
                plotarGraficoPizza(resposta);
            });
        } else {
            console.error('Erro ao buscar dados de manobras');
        }
    });
}

function plotarGraficoPizza(resposta) {
    let labels = [];
    let quantidades = [];

    resposta.forEach((dado) => {
        labels.push(dado.nomeManobra);
        quantidades.push(dado.qtd);
    });

    let ctx = document.getElementById('chartPizza');
    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                label: "Qtd",
                data: quantidades,
                backgroundColor: ['#FFD700', '#FFFFFF', '#808080', '#505050', '#202020', '#A0A0A0'],
                borderWidth: 0
            }]
        }
        ,
        options: {
            maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } }
        }
    });
}

function atualizarKPIs(dados) {
   
    let listaSessoes = dados;
    
    let totalMinutos = 0;

    for (let i = 0; i < listaSessoes.length; i++) { 
        // percorre os selects e soma o tempo minutos    
        totalMinutos += Number(listaSessoes[i].tempoMinutos);  

    // kpi tempo total
    document.getElementById("kpi_total_horas").innerHTML = totalMinutos + " min";

    // kpi sessões totais
    document.getElementById("kpi_sessoes").innerHTML = listaSessoes.length; 

    // kpi média por sessão    
    document.getElementById("kpi_msessao").innerHTML = `${(totalMinutos / listaSessoes.length).toFixed(1)} min`;

}
}
</script>
